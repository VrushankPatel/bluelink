name: Build & Release

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Write Firebase credentials
        run: |
          echo "${{ secrets.FIREBASE_CREDENTIALS_B64 }}" | base64 -d \
            > src/main/resources/firebase-credentials.json

      - name: Inject Firebase database URL
        run: |
          sed -i "s|firebase.database.url=.*|firebase.database.url=${{ secrets.FIREBASE_DATABASE_URL }}|" \
            src/main/resources/bluelink.properties

      - name: Build fat JAR
        run: mvn package -q --no-transfer-progress

      - name: Verify JAR
        run: ls -lh target/bluelink-*.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluelink-jar
          path: target/bluelink-*.jar
          retention-days: 7

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(ls target/bluelink-*.jar | head -1)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

          # Write release notes to a file to avoid YAML quoting issues
          cat > /tmp/release-notes.md << EOF
          ## Download & run

          Requires **Java 17+** — no other setup needed.

          \`\`\`bash
          java -jar bluelink-${VERSION}.jar
          \`\`\`

          - Run without arguments to **create** a new room (prints the room ID)
          - Pass a room ID to **join** an existing room: \`java -jar bluelink-${VERSION}.jar <room-id>\`

          Share the JAR with anyone — credentials are bundled in.
          EOF

          # Delete existing "latest" release/tag if present
          gh release delete latest --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Publish fresh release
          gh release create latest "$JAR" \
            --repo ${{ github.repository }} \
            --title "BlueLink latest (v${VERSION})" \
            --notes-file /tmp/release-notes.md \
            --latest
